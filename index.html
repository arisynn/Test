
<!DOCTYPE html>

    <script>
        // ================= PWA SETUP INLINE =================
        const svgIcon = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ec4899' rx='24'/><path d='M50 75.5l-3.3-3C28.2 55.7 16 44.6 16 31c0-11 8.8-19.8 19.8-19.8 6.3 0 12.4 3 16.2 7.7 3.8-4.7 9.9-7.7 16.2-7.7 11 0 19.8 8.8 19.8 19.8 0 13.6-12.2 24.7-30.7 41.5L50 75.5z' fill='white'/></svg>";
        const manifest = {
            "name": "Sweet Match-3",
            "short_name": "Sweet",
            "start_url": window.location.pathname,
            "display": "standalone",
            "background_color": "#fdf2f8",
            "theme_color": "#ec4899",
            "icons": [{ "src": svgIcon, "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(manifestBlob)}">`);

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => self.clients.claim());
                self.addEventListener('fetch', (e) => {});
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
        }
    </script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #fdf2f8; touch-action: none;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            font-family: 'Inter', sans-serif;
            color: #374151;
        }
        
        .font-game { font-family: 'Nunito', sans-serif; }
        
        /* Modern Buttons */
        .btn-modern { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); outline: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-modern:active:not(:disabled) { transform: scale(0.96); }
        .btn-modern:disabled { opacity: 0.5; cursor: not-allowed; }

        .icon-btn { display: flex; align-items: center; justify-content: center; background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 12px; color: #6b7280; transition: all 0.15s; }
        .icon-btn:active { transform: scale(0.92); background: #f3f4f6; }

        /* Match-3 Board & Tiles */
        .game-board-container {
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 8px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05), 0 8px 32px rgba(236, 72, 153, 0.15);
            border: 4px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }
        
        .grid-cell {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .grid-cell.jelly { background: rgba(236, 72, 153, 0.3); border: 2px solid rgba(236, 72, 153, 0.5); }

        .m3-tile {
            position: absolute;
            display: flex; align-items: center; justify-content: center;
            transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.2s, opacity 0.2s;
            z-index: 10;
            will-change: top, left, transform;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        .m3-tile.swapping { z-index: 20; transition: top 0.25s ease-in-out, left 0.25s ease-in-out; }
        .m3-tile.falling { transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5; }
        .m3-tile.popping { transform: scale(1.3); opacity: 0; transition: transform 0.2s ease-out, opacity 0.2s ease-out; z-index: 30; }
        .m3-tile:active { transform: scale(0.9); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1)); }

        .special-rocket-h::after { content: '↔'; position: absolute; font-size: 20px; font-weight: 900; color: white; text-shadow: 0 0 5px black; }
        .special-rocket-v::after { content: '↕'; position: absolute; font-size: 20px; font-weight: 900; color: white; text-shadow: 0 0 5px black; }
        .special-bomb::after { content: '💣'; position: absolute; font-size: 24px; filter: drop-shadow(0 0 5px red); animation: pulseHint 1s infinite; }
        .special-rainbow { animation: rainbowGlow 2s linear infinite; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%); }

        @keyframes rainbowGlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes popScore { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-40px) scale(1.5); } }
        .floating-score { position: absolute; animation: popScore 1s ease-out forwards; pointer-events: none; font-weight: 900; z-index: 100; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        @keyframes boxShake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg) scale(1.1); } 50% { transform: rotate(10deg) scale(1.1); } 75% { transform: rotate(-10deg) scale(1.1); } }
        .box-shake { animation: boxShake 0.4s ease-in-out infinite; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 8px; }

        .pwa-bg { background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%); }
        .font-mono { font-family: 'Space Mono', monospace; }
        
        .receipt-cut { position: relative; }
        .receipt-cut::before { content: ''; position: absolute; top: -6px; left: 0; right: 0; height: 12px; background-size: 12px 12px; background-image: radial-gradient(circle at 6px 0, transparent 6px, white 7px); }
        .receipt-cut::after { content: ''; position: absolute; bottom: -6px; left: 0; right: 0; height: 12px; background-size: 12px 12px; background-image: radial-gradient(circle at 6px 12px, transparent 6px, white 7px); }

        /* Confetti */
        .confetti { position: absolute; width: 10px; height: 10px; background-color: #f00; animation: confettiFall linear forwards; }
        @keyframes confettiFall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>

        const IconTicket = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path fillRule="evenodd" d="M1.5 7.125c0-1.036.84-1.875 1.875-1.875h17.25c1.035 0 1.875.84 1.875 1.875v3.375c0 .621-.504 1.125-1.125 1.125a1.125 1.125 0 0 1 0 2.25c.621 0 1.125.504 1.125 1.125v3.375c0 1.036-.84 1.875-1.875 1.875H3.375A1.875 1.875 0 0 1 1.5 18.375v-3.375c0-.621.504-1.125 1.125-1.125a1.125 1.125 0 0 1 0-2.25c-.621 0-1.125-.504-1.125-1.125V7.125ZM12 10.875a1.125 1.125 0 1 1 0 2.25 1.125 1.125 0 0 1 0-2.25Z" clipRule="evenodd" /></svg>;
        const IconCoin = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M10.464 8.746c.227-.18.497-.311.786-.394v2.795a2.252 2.252 0 01-.786-.393c-.394-.313-.546-.681-.546-1.004 0-.323.152-.691.546-1.004zM12.75 15.662v-2.824c.347.085.664.228.921.421.427.32.579.686.579.991 0 .305-.152.671-.579.991a2.534 2.534 0 01-.921.42z" /><path fillRule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v.816a3.836 3.836 0 00-1.72.756c-.712.566-1.112 1.35-1.112 2.178 0 .829.4 1.612 1.113 2.178.502.4 1.102.647 1.719.756v2.978a2.536 2.536 0 01-.921-.421l-.879-.66a.75.75 0 00-.9 1.2l.879.66c.533.4 1.169.645 1.821.75V18a.75.75 0 001.5 0v-.81a4.124 4.124 0 001.821-.749c.745-.559 1.179-1.344 1.179-2.191 0-.847-.434-1.632-1.179-2.191a4.122 4.122 0 00-1.821-.75V8.354c.29.082.559.213.786.393l.415.33a.75.75 0 00.933-1.175l-.415-.33a3.836 3.836 0 00-1.719-.755V6z" clipRule="evenodd" /></svg>;
        const IconClose = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>;
        const IconChevronLeft = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>;
        const IconPlay = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path fillRule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clipRule="evenodd" /></svg>;
        const IconGift = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>;
        const IconCrown = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-yellow-500"><path d="M4.5 21a1.5 1.5 0 01-1.5-1.5V18h18v1.5a1.5 1.5 0 01-1.5 1.5h-15zM2 7.5L5.5 16h13L22 7.5l-6 3.5L12 4l-4 7-6-3.5z"/></svg>;
        const IconLogo = () => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" className="w-20 h-20"><rect width="100" height="100" fill="#ec4899" rx="24"/><path d="M50 75.5l-3.3-3C28.2 55.7 16 44.6 16 31c0-11 8.8-19.8 19.8-19.8 6.3 0 12.4 3 16.2 7.7 3.8-4.7 9.9-7.7 16.2-7.7 11 0 19.8 8.8 19.8 19.8 0 13.6-12.2 24.7-30.7 41.5L50 75.5z" fill="white"/></svg>;

        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        const formatNumber = (num) => new Intl.NumberFormat('id-ID').format(num);

        // ===================== UPSTASH CONFIG =====================
        const UPSTASH_URL = "https://intense-calf-74085.upstash.io";
        const UPSTASH_TOKEN = "gQAAAAAAASFlAAIgcDJjODE2YjZiYjg3OWE0M2NiOTBlMTY5MzRkODBmNzU4Nw";

        const fetchProfile = async (name) => {
            try {
                const res = await fetch(`${UPSTASH_URL}/get/sc_m3_prof_${encodeURIComponent(name)}`, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
                const data = await res.json();
                if (data.result) {
                    const parsed = JSON.parse(data.result);
                    if(!parsed.unlockedThemes) parsed.unlockedThemes = ['sweets'];
                    if(parsed.balanceIDR === undefined) parsed.balanceIDR = 0;
                    if(parsed.coins === undefined) parsed.coins = 0;
                    if(parsed.flexCrown === undefined) parsed.flexCrown = false;
                    if(parsed.hp === undefined) parsed.hp = 3;
                    if(parsed.hints === undefined) parsed.hints = 3; // Now used as Hammer
                    if(parsed.shuffles === undefined) parsed.shuffles = 3;
                    if(parsed.currentLevel === undefined) parsed.currentLevel = 1;
                    if(parsed.currentScore === undefined) parsed.currentScore = 0;
                    return parsed;
                }
            } catch(e) {}
            return { tickets: 0, hints: 3, shuffles: 3, hp: 3, balanceIDR: 0, coins: 0, flexCrown: false, unlockedThemes: ['sweets'], currentLevel: 1, currentScore: 0 };
        };
        
        const saveProfile = async (name, profile) => {
            try { await fetch(`${UPSTASH_URL}/set/sc_m3_prof_${encodeURIComponent(name)}`, { method: 'POST', headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` }, body: JSON.stringify(profile) }); } catch(e) {}
        };

        const THEMES = {
            sweets: { name: 'Dessert', price: 0, data: ['🍰','🍩','🍬','🍭','🍨','🍓'] },
            animals: { name: 'Hewan', price: 500, data: ['🐶','🐱','🐭','🐰','🦊','🐼'] },
            fruits: { name: 'Buah', price: 1000, data: ['🍏','🍎','🍊','🍌','🍇','🍉'] },
            ocean: { name: 'Laut', price: 3000, data: ['🐟','🐠','🐙','🦀','🐢','🐬'] },
            luxury: { name: 'Sultan', price: 10000, data: ['💎','💍','👑','💸','🏎️','🏰'] }
        };

        // ===================== WEB AUDIO =====================
        const AudioEngine = (() => {
            let ctx = null; let muted = false;
            const getCtx = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
            const play = (freqs, dur, type = 'sine', vol = 0.3, delay = 0) => {
                if (muted) return;
                try {
                    const ac = getCtx();
                    freqs.forEach(({ f, t, d }) => {
                        const osc = ac.createOscillator(); const gain = ac.createGain();
                        osc.connect(gain); gain.connect(ac.destination); osc.type = type;
                        osc.frequency.setValueAtTime(f, ac.currentTime + delay + t);
                        gain.gain.setValueAtTime(vol, ac.currentTime + delay + t);
                        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + t + d);
                        osc.start(ac.currentTime + delay + t); osc.stop(ac.currentTime + delay + t + d + 0.05);
                    });
                } catch(e) {}
            };
            return {
                setMuted: (m) => { muted = m; }, isMuted: () => muted,
                swap: () => play([{ f: 400, t: 0, d: 0.1 }], 0.1, 'sine', 0.1),
                invalid: () => play([{ f: 200, t: 0, d: 0.1 }], 0.1, 'sawtooth', 0.1),
                pop: (combo = 1) => { const base = 400 + (combo * 50); play([{ f: base, t: 0, d: 0.1 }, { f: base*1.2, t: 0.05, d: 0.1 }], 0.15, 'triangle', 0.2); },
                bomb: () => play([{ f: 100, t: 0, d: 0.3 }, { f: 50, t: 0.1, d: 0.4 }], 0.4, 'square', 0.4),
                rocket: () => play([{ f: 800, t: 0, d: 0.2 }, { f: 1200, t: 0.1, d: 0.1 }], 0.3, 'sawtooth', 0.2),
                levelClear: () => play([{ f: 523, t: 0, d: 0.1 }, { f: 659, t: 0.1, d: 0.1 }, { f: 784, t: 0.2, d: 0.1 }, { f: 1047, t: 0.3, d: 0.4 }], 0.5, 'triangle', 0.3),
                gameOver: () => play([{ f: 300, t: 0, d: 0.2 }, { f: 250, t: 0.2, d: 0.2 }, { f: 200, t: 0.4, d: 0.4 }], 0.8, 'sawtooth', 0.3),
            };
        })();

        // ===================== CUSTOM MODAL & COMPONENTS =====================
        const CustomModal = ({ isOpen, title, content, confirmText, onConfirm, cancelText, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="absolute inset-0 bg-gray-900/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl w-full max-w-[320px] shadow-2xl modal-enter overflow-hidden">
                        <div className="bg-gray-50 p-5 border-b border-gray-100 flex justify-between items-center">
                            <h3 className="font-bold text-gray-800 text-lg">{title}</h3>
                            {onCancel && <button onClick={onCancel} className="text-gray-400 hover:text-gray-600"><IconClose /></button>}
                        </div>
                        <div className="p-6 text-sm font-medium text-gray-600 leading-relaxed text-center whitespace-pre-wrap">{content}</div>
                        <div className="p-5 flex gap-3 pt-0">
                            {onCancel && <button onClick={onCancel} className="flex-1 btn-modern bg-gray-100 text-gray-600 font-bold py-3 rounded-xl">Batal</button>}
                            <button onClick={onConfirm} className="flex-1 btn-modern bg-pink-500 text-white font-bold py-3 rounded-xl shadow-md">{confirmText || 'OK'}</button>
                        </div>
                    </div>

                    {showReceipt && (

        const Shop = ({ profile, onBuy, onClose }) => {

        };

        // ===================== MATCH-3 ENGINE =====================

        const TILE_SIZE = 48; // px
        const BOARD_WIDTH = 7;
        const BOARD_HEIGHT = 8;

        const generateLevelConfig = (level, themeId) => {
            const colorsCount = Math.min(6, 4 + Math.floor(level / 10));
            const availableColors = [...THEMES[themeId].data].slice(0, colorsCount);
            
            let moves = 15 + Math.floor(level * 1.2);
            let objective = { type: 'score', target: 1000 + (level * 800), current: 0 };
            
            // Variasi objective
            if (level % 4 === 0) objective = { type: 'jelly', target: 8 + Math.floor(level/2), current: 0 };
            else if (level % 3 === 0) objective = { type: 'collect', targetId: availableColors[0], target: 15 + level, current: 0 };

            return { cols: BOARD_WIDTH, rows: BOARD_HEIGHT, colors: availableColors, moves, objective };
        };

        const createInitialBoard = (config) => {
            let grid = []; let keyCounter = 0;
            for(let r=0; r<config.rows; r++){
                let row = [];
                for(let c=0; c<config.cols; c++){
                    // Ensure no initial matches
                    let color;
                    do { color = config.colors[Math.floor(Math.random() * config.colors.length)]; } 
                    while (
                        (r >= 2 && grid[r-1][c]?.color === color && grid[r-2][c]?.color === color) ||
                        (c >= 2 && row[c-1]?.color === color && row[c-2]?.color === color)
                    );
                    
                    let obstacle = null;
                    if(config.objective.type === 'jelly' && Math.random() < 0.3) obstacle = 'jelly';

                    row.push({ id: `t_${keyCounter++}`, color, row: r, col: c, special: null, obstacle, isNew: false });
                }
                grid.push(row);
            }
            return grid;
        };

        // Helper to clone grid
        const cloneGrid = (g) => g.map(row => row.map(cell => cell ? {...cell} : null));

        // Match Logic
        const findMatches = (grid) => {
            const rows = grid.length; const cols = grid[0].length;
            let matchedTiles = new Set();
            let matchGroups = [];

            // Horizontal
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols - 2; c++) {
                    let tile1 = grid[r][c];
                    if (!tile1) continue;
                    let matchLen = 1;
                    while (c + matchLen < cols && grid[r][c + matchLen]?.color === tile1.color) matchLen++;
                    
                    if (matchLen >= 3) {
                        let group = [];
                        for (let i = 0; i < matchLen; i++) {
                            matchedTiles.add(`${r},${c+i}`);
                            group.push({r, c: c+i});
                        }
                        matchGroups.push({ type: 'h', len: matchLen, color: tile1.color, tiles: group });
                        c += matchLen - 1; 
                    }
                }
            }

            // Vertical
            for (let c = 0; c < cols; c++) {
                for (let r = 0; r < rows - 2; r++) {
                    let tile1 = grid[r][c];
                    if (!tile1) continue;
                    let matchLen = 1;
                    while (r + matchLen < rows && grid[r + matchLen][c]?.color === tile1.color) matchLen++;
                    
                    if (matchLen >= 3) {
                        let group = [];
                        for (let i = 0; i < matchLen; i++) {
                            matchedTiles.add(`${r+i},${c}`);
                            group.push({r: r+i, c});
                        }
                        matchGroups.push({ type: 'v', len: matchLen, color: tile1.color, tiles: group });
                        r += matchLen - 1;
                    }
                }
            }

            return { coords: Array.from(matchedTiles).map(str => { const [r,c] = str.split(','); return {r:parseInt(r), c:parseInt(c)}; }), groups: matchGroups };
        };


        // ===================== MAIN APP COMPONENT =====================
        const App = () => {
            const [isStandalone, setIsStandalone] = useState(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('sm_name') || '');
            const [gameState, setGameState] = useState('LOGIN'); 
            const [profile, setProfile] = useState(null);
            const [activeTheme, setActiveTheme] = useState('sweets');
            
            // Game State
            const [grid, setGrid] = useState([]);
            const [config, setConfig] = useState(null);
            const [moves, setMoves] = useState(0);
            const [score, setScore] = useState(0);
            const [objective, setObjective] = useState(null);
            const [combo, setCombo] = useState(0);
            const [isAnimating, setIsAnimating] = useState(false);
            const [draggedTile, setDraggedTile] = useState(null);
            const [poppingCoords, setPoppingCoords] = useState([]);
            const [floatingTexts, setFloatingTexts] = useState([]);
            
            // Booster mode
            const [activeBooster, setActiveBooster] = useState(null); // 'hammer'

            const gridRef = useRef(grid);
            const nextKey = useRef(1000);

            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => { e.preventDefault(); setDeferredPrompt(e); };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            useEffect(() => { gridRef.current = grid; }, [grid]);

            const handleLogin = async () => {
                if(!playerName.trim()) return;
                localStorage.setItem('sm_name', playerName);
                const p = await fetchProfile(playerName);
                setProfile(p); setGameState('LOBBY');
            };

            const startLevel = (levelToStart) => {
                const conf = generateLevelConfig(levelToStart, activeTheme);
                const initialGrid = createInitialBoard(conf);
                setConfig(conf); setGrid(initialGrid); setMoves(conf.moves); setScore(0); setObjective(conf.objective);
                setCombo(0); setFloatingTexts([]); setActiveBooster(null);
                setGameState('PLAYING');
            };

            const addFloatingText = (text, r, c) => {
                const id = Date.now() + Math.random();
                setFloatingTexts(prev => [...prev, { id, text, r, c }]);
                setTimeout(() => setFloatingTexts(prev => prev.filter(ft => ft.id !== id)), 1000);
            };

            // CORE MATCH-3 LOOP
            const processCascade = async (currentGrid, currentCombo, originSwap = null) => {
                let matchesInfo = findMatches(currentGrid);
                let toDestroy = new Set();
                let newSpecials = []; // {r,c,type}

                if (matchesInfo.coords.length === 0) return false; // No more cascades

                setIsAnimating(true);
                
                // 1. Identify Power-ups from matches
                matchesInfo.groups.forEach(g => {
                    if (g.len === 5) {
                        // Rainbow
                        let targetNode = originSwap && g.tiles.find(t=>t.r===originSwap.r && t.c===originSwap.c) ? originSwap : g.tiles[2];
                        newSpecials.push({ r: targetNode.r, c: targetNode.c, type: 'rainbow' });
                    } else if (g.len === 4) {
                        // Rocket (h/v depends on match direction)
                        let type = g.type === 'h' ? 'rocket_h' : 'rocket_v';
                        let targetNode = originSwap && g.tiles.find(t=>t.r===originSwap.r && t.c===originSwap.c) ? originSwap : g.tiles[1];
                        newSpecials.push({ r: targetNode.r, c: targetNode.c, type });
                    }
                    // Add basic tiles to destroy
                    g.tiles.forEach(t => toDestroy.add(`${t.r},${t.c}`));
                });

                // Check for intersections (Bomb) - Simplified logic
                let rCounts = {}; let cCounts = {};
                toDestroy.forEach(s => { const [r,c] = s.split(','); rCounts[r] = (rCounts[r]||0)+1; cCounts[c] = (cCounts[c]||0)+1; });
                toDestroy.forEach(s => {
                    const [r,c] = s.split(',');
                    if(rCounts[r] >= 3 && cCounts[c] >= 3) {
                        newSpecials.push({ r: parseInt(r), c: parseInt(c), type: 'bomb' });
                        // Remove from rainbow/rocket if overlapping (simple resolution)
                        newSpecials = newSpecials.filter(sp => sp.type==='bomb' || (sp.r!==parseInt(r) || sp.c!==parseInt(c)));
                    }
                });

                // 2. Trigger existing specials inside the match
                toDestroy.forEach(coord => {
                    const [r, c] = coord.split(',').map(Number);
                    const tile = currentGrid[r][c];
                    if(tile && tile.special) triggerSpecial(currentGrid, r, c, tile.special, tile.color, toDestroy);
                });

                const coordsToPop = Array.from(toDestroy).map(str => { const [r,c] = str.split(','); return {r:parseInt(r), c:parseInt(c)}; });
                
                // Visual Update: Popping
                setPoppingCoords(coordsToPop);
                AudioEngine.pop(currentCombo);
                
                // Scoring
                const points = coordsToPop.length * 10 * (currentCombo + 1);
                setScore(s => s + points);
                if(coordsToPop.length > 0) addFloatingText(`+${points}`, coordsToPop[0].r, coordsToPop[0].c);

                // Update Objective
                setObjective(obj => {
                    let newObj = {...obj};
                    if (obj.type === 'score') newObj.current += points;
                    else if (obj.type === 'jelly') {
                        coordsToPop.forEach(({r,c}) => { if(currentGrid[r][c]?.obstacle === 'jelly') newObj.current++; });
                    }
                    else if (obj.type === 'collect') {
                        coordsToPop.forEach(({r,c}) => { if(currentGrid[r][c]?.color === obj.targetId && !currentGrid[r][c].special) newObj.current++; });
                    }
                    return newObj;
                });

                await new Promise(res => setTimeout(res, 250)); // Pop duration

                // 3. Remove tiles & Spawn specials
                let nextGrid = cloneGrid(currentGrid);
                coordsToPop.forEach(({r,c}) => {
                    if(nextGrid[r][c]?.obstacle === 'jelly') nextGrid[r][c].obstacle = null; // Clear jelly
                    nextGrid[r][c] = null; 
                });
                setPoppingCoords([]);

                newSpecials.forEach(sp => {
                    nextGrid[sp.r][sp.c] = { id: `t_${nextKey.current++}`, color: currentGrid[sp.r][sp.c]?.color || config.colors[0], special: sp.type, row: sp.r, col: sp.c, obstacle: null };
                });

                // 4. Gravity & Refill
                for(let c=0; c<config.cols; c++) {
                    let writeR = config.rows - 1;
                    for(let readR = config.rows - 1; readR >= 0; readR--) {
                        if(nextGrid[readR][c] !== null) {
                            if(writeR !== readR) {
                                nextGrid[writeR][c] = nextGrid[readR][c];
                                nextGrid[writeR][c].row = writeR;
                                nextGrid[readR][c] = null;
                            }
                            writeR--;
                        }
                    }
                    // Refill top
                    while(writeR >= 0) {
                        nextGrid[writeR][c] = { id: `t_${nextKey.current++}`, color: config.colors[Math.floor(Math.random()*config.colors.length)], row: writeR, col: c, special: null, obstacle: null, isNew: true };
                        writeR--;
                    }
                }

                setGrid(nextGrid);
                await new Promise(res => setTimeout(res, 350)); // Fall duration
                
                // Clear isNew flag
                setGrid(g => g.map(row => row.map(cell => ({...cell, isNew:false}))));

                // 5. Recurse cascade
                setCombo(currentCombo + 1);
                const willCascade = await processCascade(nextGrid, currentCombo + 1);
                
                if(!willCascade && currentCombo === 0) {
                    // Cascade ended. Check Win/Loss
                    setIsAnimating(false);
                    checkWinLoss();
                }
                return true;
            };

            const triggerSpecial = (grid, r, c, type, color, destroySet) => {
                if(type === 'rocket_h') { AudioEngine.rocket(); for(let i=0; i<config.cols; i++) destroySet.add(`${r},${i}`); }
                else if(type === 'rocket_v') { AudioEngine.rocket(); for(let i=0; i<config.rows; i++) destroySet.add(`${i},${c}`); }
                else if(type === 'bomb') {
                    AudioEngine.bomb();
                    for(let i=Math.max(0,r-1); i<=Math.min(config.rows-1,r+1); i++)
                        for(let j=Math.max(0,c-1); j<=Math.min(config.cols-1,c+1); j++) destroySet.add(`${i},${j}`);
                }
                else if(type === 'rainbow') {
                    AudioEngine.levelClear();
                    let targetColor = color; // If swapped with normal tile, that color is used.
                    for(let i=0; i<config.rows; i++) for(let j=0; j<config.cols; j++) 
                        if(grid[i][j] && grid[i][j].color === targetColor) destroySet.add(`${i},${j}`);
                }
            };

            const checkWinLoss = () => {
                setObjective(currObj => {
                    if (currObj.current >= currObj.target) {
                        setTimeout(() => handleLevelEnd(true), 500);
                    } else if (moves <= 0) {
                        setTimeout(() => handleLevelEnd(false), 500);
                    }
                    return currObj;
                });
            };

            const handleLevelEnd = async (isWin) => {
                if(isWin) {
                    AudioEngine.levelClear();
                    const bonusCoins = Math.floor(score * 0.1) + (moves * 10);
                    const gotTicket = Math.random() > 0.5 ? 1 : 0; // 50% chance
                    const p = { ...profile, currentLevel: profile.currentLevel + 1, coins: profile.coins + bonusCoins, tickets: profile.tickets + gotTicket };
                    setProfile(p); await saveProfile(playerName, p);
                    setGameState('WON');
                } else {
                    AudioEngine.gameOver();
                    const p = { ...profile, hp: Math.max(0, profile.hp - 1) };
                    setProfile(p); await saveProfile(playerName, p);
                    setGameState('GAMEOVER');
                }
            };

            // Player Actions
            const attemptSwap = async (r1, c1, r2, c2) => {
                if (isAnimating || moves <= 0) return;
                
                // Booster logic
                if (activeBooster === 'hammer') {
                    if(profile.hints > 0) {
                        setIsAnimating(true);
                        const p = {...profile, hints: profile.hints - 1}; setProfile(p); saveProfile(playerName, p);
                        let nextGrid = cloneGrid(gridRef.current);
                        setPoppingCoords([{r:r1, c:c1}]); AudioEngine.bomb();
                        await new Promise(r=>setTimeout(r, 200));
                        nextGrid[r1][c1] = null;
                        
                        // Gravity
                        for(let c=0; c<config.cols; c++) {
                            let writeR = config.rows - 1;
                            for(let readR = config.rows - 1; readR >= 0; readR--) {
                                if(nextGrid[readR][c] !== null) {
                                    if(writeR !== readR) { nextGrid[writeR][c] = nextGrid[readR][c]; nextGrid[writeR][c].row = writeR; nextGrid[readR][c] = null; }
                                    writeR--;
                                }
                            }
                            while(writeR >= 0) { nextGrid[writeR][c] = { id: `t_${nextKey.current++}`, color: config.colors[Math.floor(Math.random()*config.colors.length)], row: writeR, col: c, special: null, obstacle: null, isNew:true }; writeR--; }
                        }
                        setGrid(nextGrid); setActiveBooster(null); setPoppingCoords([]);
                        await new Promise(r=>setTimeout(r, 300));
                        setGrid(g => g.map(row => row.map(cell => ({...cell, isNew:false}))));
                        await processCascade(nextGrid, 0);
                    }
                    return;
                }

                // Normal Swap
                if (Math.abs(r1-r2) + Math.abs(c1-c2) !== 1) return; // Must be adjacent

                setIsAnimating(true); setCombo(0);
                let tempGrid = cloneGrid(gridRef.current);
                let t1 = tempGrid[r1][c1]; let t2 = tempGrid[r2][c2];
                t1.row = r2; t1.col = c2; t2.row = r1; t2.col = c1;
                tempGrid[r1][c1] = t2; tempGrid[r2][c2] = t1;
                
                setGrid(tempGrid); AudioEngine.swap();
                await new Promise(res => setTimeout(res, 250)); // Swap anim duration

                // Special combo (Rainbow + Any)
                let toDestroy = new Set();
                if (t1.special === 'rainbow' || t2.special === 'rainbow') {
                    let rb = t1.special === 'rainbow' ? t1 : t2;
                    let other = t1.special === 'rainbow' ? t2 : t1;
                    triggerSpecial(tempGrid, rb.row, rb.col, 'rainbow', other.color, toDestroy);
                    
                    // Force cascade
                    setMoves(m => m - 1);
                    await processCascade(tempGrid, 0, {r:r2, c:c2});
                    return;
                }

                // Check matches
                const matches = findMatches(tempGrid);
                if (matches.coords.length === 0) {
                    // Invalid -> Revert
                    AudioEngine.invalid();
                    let revertGrid = cloneGrid(tempGrid);
                    let rt1 = revertGrid[r1][c1]; let rt2 = revertGrid[r2][c2];
                    rt1.row = r2; rt1.col = c2; rt2.row = r1; rt2.col = c1;
                    revertGrid[r1][c1] = rt2; revertGrid[r2][c2] = rt1;
                    setGrid(revertGrid);
                    setTimeout(() => setIsAnimating(false), 250);
                } else {
                    // Valid
                    setMoves(m => m - 1);
                    await processCascade(tempGrid, 0, {r: r2, c: c2});
                }
            };

            const useShuffle = async () => {
                if(profile.shuffles > 0 && !isAnimating) {
                    setIsAnimating(true);
                    const p = {...profile, shuffles: profile.shuffles - 1}; setProfile(p); saveProfile(playerName, p);
                    
                    let tiles = [];
                    grid.forEach(row => row.forEach(c => { if(c) tiles.push({...c}); }));
                    tiles.sort(()=>Math.random()-0.5);
                    
                    let newGrid = cloneGrid(grid);
                    let i = 0;
                    for(let r=0; r<config.rows; r++) for(let c=0; c<config.cols; c++) {
                        newGrid[r][c] = tiles[i++];
                        newGrid[r][c].row = r; newGrid[r][c].col = c;
                    }
                    setGrid(newGrid); AudioEngine.levelClear();
                    setTimeout(() => { setIsAnimating(false); processCascade(newGrid, 0); }, 500);
                }
            };

            // Touch Handlers for Dragging
            const handleTouchStart = (e, r, c) => {
                if(isAnimating) return;
                const touch = e.touches ? e.touches[0] : e;
                setDraggedTile({ r, c, startX: touch.clientX, startY: touch.clientY });
            };
            
            const handleTouchEnd = (e) => {
                if(!draggedTile || isAnimating) return;
                const touch = e.changedTouches ? e.changedTouches[0] : e;
                const dx = touch.clientX - draggedTile.startX;
                const dy = touch.clientY - draggedTile.startY;
                
                if(Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    let targetR = draggedTile.r; let targetC = draggedTile.c;
                    if(Math.abs(dx) > Math.abs(dy)) targetC += dx > 0 ? 1 : -1;
                    else targetR += dy > 0 ? 1 : -1;
                    
                    if(targetR >= 0 && targetR < config.rows && targetC >= 0 && targetC < config.cols) {
                        attemptSwap(draggedTile.r, draggedTile.c, targetR, targetC);
                    }
                } else if (activeBooster === 'hammer') {
                    // Click instead of drag for hammer
                    attemptSwap(draggedTile.r, draggedTile.c, draggedTile.r, draggedTile.c);
                }
                setDraggedTile(null);
            };

            // ===================== RENDERERS =====================
            
            if (!isStandalone) return <InstallPrompt deferredPrompt={deferredPrompt} />;

            if (gameState === 'LOGIN') {
                return (
                    <div className="flex w-full h-full items-center justify-center bg-pink-50 p-6">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
                            <h1 className="text-3xl font-black text-pink-500 mb-2 font-game">Sweet Match-3</h1>
                            <p className="text-gray-500 mb-8 text-sm font-medium">Mainkan puzzle, kumpulkan skor, tarik Rupiah!</p>
                            <input type="text" placeholder="Nama Panggilan" maxLength={15} className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-center text-lg font-bold w-full focus:outline-none focus:border-pink-400 mb-4" value={playerName} onChange={e => setPlayerName(e.target.value)} />
                            <button onClick={handleLogin} className="btn-modern bg-pink-500 text-white w-full py-4 rounded-xl font-bold text-lg shadow-md">Mulai Main</button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'LOBBY') {
                return (
                    <div className="flex flex-col w-full h-full bg-white relative">
                        <div className="flex justify-between p-6 pb-2 items-center">
                            <div><span className="text-xs font-bold text-gray-400">Hai,</span><div className="text-2xl font-black">{playerName}</div></div>
                            <button onClick={() => setGameState('WALLET')} className="btn-modern bg-gray-50 px-4 py-2 rounded-xl text-gray-800 font-bold border border-gray-200 shadow-sm"><IconWallet/> Dompet</button>
                        </div>
                        <div className="flex-1 flex flex-col justify-center items-center p-6 gap-6">
                            <div className="w-full bg-gradient-to-br from-pink-400 to-rose-500 rounded-3xl p-6 text-white shadow-xl shadow-pink-200 text-center relative overflow-hidden">
                                <div className="text-sm font-bold opacity-80 mb-1">Level Saat Ini</div>
                                <div className="text-6xl font-black mb-4 font-game">{profile.currentLevel}</div>
                                <button onClick={() => { if(profile.hp > 0) startLevel(profile.currentLevel); else alert("Nyawa Habis!"); }} className="bg-white text-pink-500 w-full py-4 rounded-xl font-black text-lg shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                                    <IconPlay/> Mainkan
                                </button>
                                <div className="absolute -top-4 -right-4 w-24 h-24 bg-white/20 rounded-full"></div>
                            </div>
                            
                            <div className="flex gap-4 w-full">
                                <button onClick={()=>setGameState('MYSTERY')} className="flex-1 bg-purple-50 text-purple-700 py-4 rounded-2xl font-bold flex flex-col items-center justify-center border border-purple-100 shadow-sm relative">
                                    <IconGift/><span className="mt-1 text-sm">Gacha</span>
                                    {profile.tickets > 0 && <span className="absolute top-2 right-2 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center">{profile.tickets}</span>}
                                </button>
                                <button onClick={()=>setGameState('SHOP')} className="flex-1 bg-amber-50 text-amber-700 py-4 rounded-2xl font-bold flex flex-col items-center justify-center border border-amber-100 shadow-sm">
                                    <IconStore/><span className="mt-1 text-sm">Toko</span>
                                </button>
                            </div>
                            
                            <div className="flex gap-4 items-center bg-gray-50 px-6 py-3 rounded-2xl w-full justify-between">
                                <div className="flex items-center gap-2 text-rose-500 font-bold"><IconHeart/> {profile.hp}</div>
                                <div className="flex items-center gap-2 text-blue-500 font-bold"><IconHammer/> {profile.hints}</div>
                                <div className="flex items-center gap-2 text-purple-500 font-bold"><IconRefresh/> {profile.shuffles}</div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'WALLET') return <Wallet profile={profile} playerName={playerName} onWithdraw={()=>{}} onClose={()=>setGameState('LOBBY')}/>;
            if (gameState === 'MYSTERY') return <MysteryGift profile={profile} onOpenComplete={(p)=>{setProfile(p); saveProfile(playerName,p);}} onClose={()=>setGameState('LOBBY')}/>;
            if (gameState === 'SHOP') return <Shop profile={profile} onBuy={async(it)=>{ if(profile.coins>=it.price){ const p={...profile, coins:profile.coins-it.price, [it.id]:profile[it.id]+(it.id==='hp'?1:3)}; setProfile(p); saveProfile(playerName,p); }else alert("Koin tidak cukup"); }} onClose={()=>setGameState('LOBBY')}/>;

            // PLAYING STATE
            return (
                <div className="flex flex-col w-full h-full bg-[#fdf2f8]">
                    {/* Header Game */}
                    <div className="bg-white/80 backdrop-blur-md px-4 py-3 border-b border-pink-100 flex flex-col gap-2 z-50 shadow-sm">
                        <div className="flex justify-between items-center">
                            <button onClick={()=>setGameState('LOBBY')} className="p-2 bg-gray-100 rounded-full text-gray-500"><IconPause/></button>
                            <div className="font-black text-xl text-gray-800 font-game">Level {profile.currentLevel}</div>
                            <div className="flex items-center gap-1.5 bg-rose-50 px-3 py-1.5 rounded-full font-bold text-rose-500 text-sm border border-rose-100"><IconHeart/> {profile.hp}</div>
                        </div>
                        <div className="flex justify-between items-end">
                            <div className="flex flex-col">
                                <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Target</span>
                                <div className="font-bold text-gray-800 flex items-center gap-1">
                                    {objective?.type === 'score' && `Skor: ${formatNumber(objective.current)} / ${formatNumber(objective.target)}`}
                                    {objective?.type === 'jelly' && `Hancurkan Jelly: ${objective.current} / ${objective.target}`}
                                    {objective?.type === 'collect' && <><span className="text-xl">{objective.targetId}</span> {objective.current} / {objective.target}</>}
                                </div>
                            </div>
                            <div className="flex flex-col items-end">
                                <span className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Langkah</span>
                                <div className="text-3xl font-black text-pink-500 font-game leading-none">{moves}</div>
                            </div>
                        </div>
                    </div>

                    {/* Board Area */}
                    <div className="flex-1 flex flex-col items-center justify-center p-2 relative overflow-hidden">
                        {/* Combo Indicator */}
                        {combo > 1 && <div className="absolute top-4 font-black text-2xl text-rose-500 font-game animate-bounce z-0 opacity-50">Combo x{combo}!</div>}
                        
                        <div className="game-board-container" style={{ width: `${BOARD_WIDTH * TILE_SIZE + 16}px`, height: `${BOARD_HEIGHT * TILE_SIZE + 16}px` }}>
                            {/* Grid Background */}
                            <div className="absolute inset-[8px] grid pointer-events-none" style={{ gridTemplateColumns: `repeat(${BOARD_WIDTH}, 1fr)`, gridTemplateRows: `repeat(${BOARD_HEIGHT}, 1fr)`, gap: '2px' }}>
                                {grid.map((row, r) => row.map((cell, c) => (
                                    <div key={`bg-${r}-${c}`} className={`grid-cell ${grid[r][c]?.obstacle === 'jelly' ? 'jelly' : ''}`}></div>
                                )))}
                            </div>
                            
                            {/* Active Tiles */}
                            <div className="absolute inset-[8px]" onMouseLeave={handleTouchEnd} onTouchCancel={handleTouchEnd} onMouseUp={handleTouchEnd}>
                                {grid.map(row => row.map(tile => {
                                    if (!tile) return null;
                                    const isPopping = poppingCoords.some(pc => pc.r === tile.row && pc.c === tile.col);
                                    let classNames = `m3-tile ${tile.isNew ? 'falling' : ''} ${isPopping ? 'popping' : ''} `;
                                    if (tile.special) classNames += `special-${tile.special}`;
                                    
                                    return (
                                        <div key={tile.id} 
                                            className={classNames}
                                            style={{ 
                                                width: `${TILE_SIZE}px`, height: `${TILE_SIZE}px`,
                                                top: `${tile.row * TILE_SIZE}px`, left: `${tile.col * TILE_SIZE}px`,
                                                ...(tile.isNew ? { top: `-${TILE_SIZE}px` } : {}) // Spawn from above
                                            }}
                                            onMouseDown={(e) => handleTouchStart(e, tile.row, tile.col)}
                                            onTouchStart={(e) => handleTouchStart(e, tile.row, tile.col)}
                                        >
                                            <span style={{ fontSize: '32px', filter: 'drop-shadow(0 2px 2px rgba(0,0,0,0.15))' }}>{tile.color}</span>
                                        </div>
                                    );
                                }))}
                            </div>
                            
                            {/* Floating Texts */}
                            {floatingTexts.map(ft => (
                                <div key={ft.id} className="floating-score text-pink-500" style={{ top: `${ft.r * TILE_SIZE}px`, left: `${ft.c * TILE_SIZE}px` }}>{ft.text}</div>
                            ))}
                        </div>
                    </div>

                    {/* Footer Boosters */}
                    <div className="bg-white p-4 flex justify-center gap-4 border-t border-gray-100 z-50">
                        <button onClick={() => setActiveBooster(activeBooster==='hammer'?null:'hammer')} className={`flex flex-col items-center justify-center w-16 h-16 rounded-2xl border-2 transition-all ${activeBooster==='hammer'?'border-pink-500 bg-pink-50':'border-gray-200 bg-gray-50'}`}>
                            <IconHammer/><span className="text-[10px] font-bold mt-1">{profile.hints}</span>
                        </button>
                        <button onClick={useShuffle} className="flex flex-col items-center justify-center w-16 h-16 rounded-2xl border-2 border-gray-200 bg-gray-50 transition-all active:scale-95">
                            <IconRefresh/><span className="text-[10px] font-bold mt-1">{profile.shuffles}</span>
                        </button>
                    </div>

                    {/* Result Modals */}
                    {gameState === 'WON' && (
                        <div className="absolute inset-0 bg-white/90 backdrop-blur-md z-[200] flex flex-col items-center justify-center p-6 text-center">
                            <div className="confetti" style={{left: '20%', animationDelay: '0s'}}></div><div className="confetti" style={{left: '50%', animationDelay: '0.2s', backgroundColor: '#ec4899'}}></div><div className="confetti" style={{left: '80%', animationDelay: '0.1s', backgroundColor: '#3b82f6'}}></div>
                            <h2 className="text-4xl font-black text-pink-500 mb-2 font-game">LEVEL SELESAI!</h2>
                            <p className="font-bold text-gray-500 mb-8">Skor Akhir: {formatNumber(score)}</p>
                            <button onClick={() => setGameState('LOBBY')} className="btn-modern bg-pink-500 text-white w-full max-w-xs py-4 rounded-xl font-bold text-lg shadow-xl">Lanjut</button>
                        </div>
                    )}

                    {gameState === 'GAMEOVER' && (
                        <div className="absolute inset-0 bg-gray-900/90 backdrop-blur-md z-[200] flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-4xl font-black text-white mb-2 font-game">LANGKAH HABIS</h2>
                            <p className="font-bold text-rose-400 mb-8">-1 Nyawa</p>
                            <button onClick={() => setGameState('LOBBY')} className="btn-modern bg-white text-gray-900 w-full max-w-xs py-4 rounded-xl font-bold text-lg shadow-xl">Kembali</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
