    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #fdf2f8; touch-action: none;
            overflow: hidden; user-select: none; -webkit-user-select: none;
            font-family: 'Inter', sans-serif;
            color: #374151;
        }
        
        .btn-modern {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); outline: none;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-modern:active:not(:disabled) { transform: scale(0.96); }
        .btn-modern:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: #ec4899; color: white; border-radius: 16px; font-weight: 800;
            box-shadow: 0 4px 0 #be185d, 0 8px 16px rgba(236, 72, 153, 0.2);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #be185d, 0 4px 8px rgba(236, 72, 153, 0.2); }

        .icon-btn {
            display: flex; align-items: center; justify-content: center;
            background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 12px;
            color: #6b7280; transition: all 0.15s;
        }
        .icon-btn:active { transform: scale(0.92); background: #f3f4f6; }

        .cute-tile {
            background-color: white; border: 1px solid #fbcfe8;
            border-radius: 8px; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s ease-out, border-color 0.15s ease-out, box-shadow 0.15s;
            position: relative;
        }
        .cute-tile.selected {
            background-color: #fff1f2; border: 2px solid #ec4899;
            transform: scale(1.1); box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); z-index: 30;
        }
        .cute-tile.matched {
            transition: transform 0.2s ease-out, opacity 0.15s ease-out 0.2s; 
            opacity: 0; transform: scale(1.2) translateY(-10px);
            pointer-events: none; z-index: 40;
            border-color: #fcd34d; box-shadow: 0 0 15px rgba(252, 211, 77, 0.5);
        }

        @keyframes drawPath { 0% { stroke-dashoffset: 100; opacity: 1; } 40%, 60% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 0; } }
        .path-line-outer { stroke-dasharray: 100; animation: drawPath 0.35s ease-out forwards; }
        
        @keyframes pulseHint { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } 50% { transform: scale(1.05); box-shadow: 0 0 0 6px rgba(251, 191, 36, 0.4); border-color: #fbbf24;} }
        .hint-glow { animation: pulseHint 1s infinite; z-index: 25; }

        @keyframes wrongShake { 0%, 100% { transform: translateX(0); border-color: #fbcfe8; } 20%, 60% { transform: translateX(-4px); border-color: #ef4444; background: #fef2f2; } 40%, 80% { transform: translateX(4px); border-color: #ef4444; background: #fef2f2; } }
        .cute-tile.wrong { animation: wrongShake 0.35s ease-out forwards; }

        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }
        .float-text { animation: floatUp 1s ease-out forwards; pointer-events: none; }

        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        @keyframes boxShake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg) scale(1.1); } 50% { transform: rotate(10deg) scale(1.1); } 75% { transform: rotate(-10deg) scale(1.1); } }
        .box-shake { animation: boxShake 0.4s ease-in-out infinite; }
        .box-idle { transition: transform 0.2s; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 8px; }

        .pwa-bg { background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%); }
        
        .font-mono { font-family: 'Space Mono', monospace; }
        
        .receipt-cut {
            position: relative;
        }
        .receipt-cut::before {
            content: '';
            position: absolute;
            top: -6px; left: 0; right: 0; height: 12px;
            background-size: 12px 12px;
            background-image: radial-gradient(circle at 6px 0, transparent 6px, white 7px);
        }
        .receipt-cut::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 0; right: 0; height: 12px;
            background-size: 12px 12px;
            background-image: radial-gradient(circle at 6px 12px, transparent 6px, white 7px);
        }

        const IconClose = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>;
        const IconChevronLeft = () => <svg fill="none" viewBox="0 0 24 24" strokeWidth={2.5} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>;
        const IconPlay = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path fillRule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clipRule="evenodd" /></svg>;
        const IconGift = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>;
        
        const IconCrown = () => <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-yellow-500"><path d="M4.5 21a1.5 1.5 0 01-1.5-1.5V18h18v1.5a1.5 1.5 0 01-1.5 1.5h-15zM2 7.5L5.5 16h13L22 7.5l-6 3.5L12 4l-4 7-6-3.5z"/></svg>;
        const IconShareApple = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 inline-block mx-1"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>;
        const IconDotsAndroid = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 inline-block mx-1"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>;

        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        const formatNumber = (num) => new Intl.NumberFormat('id-ID').format(num);

        // ===================== UPSTASH CONFIG =====================
        const UPSTASH_URL = "https://intense-calf-74085.upstash.io";
        const UPSTASH_TOKEN = "gQAAAAAAASFlAAIgcDJjODE2YjZiYjg3OWE0M2NiOTBlMTY5MzRkODBmNzU4Nw";

        const fetchProfile = async (name) => {
            try {
                const res = await fetch(`${UPSTASH_URL}/get/sc_prof2_${encodeURIComponent(name)}`, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
                const data = await res.json();
                if (data.result) {
                    const parsed = JSON.parse(data.result);
                    // Migrasi & Default
                    if(!parsed.unlockedThemes) parsed.unlockedThemes = ['sweets'];
                    if(parsed.balanceIDR === undefined) parsed.balanceIDR = 0;
                    if(parsed.coins === undefined) parsed.coins = 0;
                    if(parsed.flexCrown === undefined) parsed.flexCrown = false;
                    
                    if(parsed.hp === undefined) parsed.hp = Math.min(9, 3 + (parsed.bonusHP || 0));
                    if(parsed.hints === undefined) parsed.hints = Math.min(99, 3 + (parsed.bonusHints || 0));
                    if(parsed.shuffles === undefined) parsed.shuffles = Math.min(99, 3 + (parsed.bonusShuffles || 0));
                    
                    if(parsed.currentLevel === undefined) parsed.currentLevel = 1;
                    if(parsed.currentScore === undefined) parsed.currentScore = 0;

                    // Support untuk Resume Game
                    if(parsed.savedBoard === undefined) parsed.savedBoard = null;
                    if(parsed.savedProgress === undefined) parsed.savedProgress = 100;
                    
                    return parsed;
                }
            } catch(e) {}
            return { 
                tickets: 0, hints: 3, shuffles: 3, hp: 3, balanceIDR: 0, coins: 0, 
                flexCrown: false, unlockedThemes: ['sweets'], currentLevel: 1, currentScore: 0,
                savedBoard: null, savedProgress: 100 // Default state untuk save game
            };
        };
        
        const saveProfile = async (name, profile) => {
            try { await fetch(`${UPSTASH_URL}/set/sc_prof2_${encodeURIComponent(name)}`, { method: 'POST', headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` }, body: JSON.stringify(profile) }); } catch(e) {}
        };

        const ROWS = 16; const COLS = 10;
        const THEMES = {
            sweets: { name: 'Dessert', price: 0, data: ['🍰','🧁','🍩','🍪','🍫','🍬','🍭','🍮','🍯','🍨','🍧','🍦','🥧','🎂','🥐','🥞','🧇','🥨'] },
            animals: { name: 'Hewan', price: 500, data: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤'] },
            fruits: { name: 'Buah', price: 1000, data: ['🍏','🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝','🍅'] },
            flowers: { name: 'Bunga', price: 1500, data: ['🌷','🌸','🌹','🌺','🌻','🌼','💮','🪷','💐','🪴','🍀','🍁','🍄','🌵','🌲','🌿','🌾','🌴'] },
            ocean: { name: 'Laut', price: 3000, data: ['🐟','🐠','🐡','🦈','🐙','🦑','🦀','🦞','🦐','🐢','🐋','🐬','🦭','🐚','🪸','🌊','⛵','⚓'] },
            space: { name: 'L. Angkasa', price: 5000, data: ['🚀','🛸','🛰️','🪐','🌎','🌔','☀️','⭐','☄️','🌠','🌌','🧑‍🚀','👽','👾','🔭','📡','👨‍🚀'] },
            luxury: { name: 'Sultan', price: 10000, data: ['💎','💍','👑','🛍️','👠','🎩','🍷','🥂','🏰','🏎️','🚁','🛥️','🗽','💸','💳','🎀','🪄'] }
        };

        // ===================== WEB AUDIO =====================
        const AudioEngine = (() => {
            let ctx = null; let muted = false;
            const getCtx = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
            const play = (freqs, dur, type = 'sine', vol = 0.3, delay = 0) => {
                if (muted) return;
                try {
                    const ac = getCtx();
                    freqs.forEach(({ f, t, d }) => {
                        const osc = ac.createOscillator(); const gain = ac.createGain();
                        osc.connect(gain); gain.connect(ac.destination); osc.type = type;
                        osc.frequency.setValueAtTime(f, ac.currentTime + delay + t);
                        gain.gain.setValueAtTime(vol, ac.currentTime + delay + t);
                        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + t + d);
                        osc.start(ac.currentTime + delay + t); osc.stop(ac.currentTime + delay + t + d + 0.05);
                    });
                } catch(e) {}
            };
            return {
                setMuted: (m) => { muted = m; }, isMuted: () => muted,
                match: () => play([{ f: 523, t: 0, d: 0.1 }, { f: 659, t: 0.08, d: 0.1 }, { f: 784, t: 0.16, d: 0.2 }], 0.4, 'triangle', 0.25),
                wrong: () => play([{ f: 180, t: 0, d: 0.1 }], 0.1, 'sawtooth', 0.15),
                hint: () => play([{ f: 880, t: 0, d: 0.2 }], 0.2, 'sine', 0.2),
                shuffle: () => play([400, 500, 350, 600, 450].map((f, i) => ({ f, t: i * 0.05, d: 0.1 })), 0.3, 'sine', 0.2),
                tick: (n) => { const f = n === 'GO!' ? 880 : (n === 1 ? 660 : n === 2 ? 587 : 523); play([{ f, t: 0, d: n === 'GO!' ? 0.3 : 0.15 }], 0.15, 'triangle', 0.3); },
                levelClear: () => play([{ f: 523, t: 0, d: 0.1 }, { f: 659, t: 0.1, d: 0.1 }, { f: 784, t: 0.2, d: 0.1 }, { f: 1047, t: 0.3, d: 0.3 }], 0.5, 'triangle', 0.25),
                gameOver: () => play([{ f: 440, t: 0, d: 0.15 }, { f: 370, t: 0.15, d: 0.15 }, { f: 294, t: 0.3, d: 0.3 }], 0.5, 'sawtooth', 0.2),
                timeout: () => play([{ f: 300, t: 0, d: 0.2 }, { f: 220, t: 0.2, d: 0.3 }], 0.5, 'sawtooth', 0.2),
                spin: () => play([{f: 600, t:0, d:0.1}], 0.1, 'sine', 0.1),
                winPrize: () => play([{ f: 440, t: 0, d: 0.1 }, { f: 554, t: 0.1, d: 0.1 }, { f: 659, t: 0.2, d: 0.3 }], 0.5, 'triangle', 0.3),
            };
        })();

        // --- PATHFINDING ---
        const isPathClear = (board, r1, c1, r2, c2) => {
            if (r1 === r2) { const min = Math.min(c1, c2); const max = Math.max(c1, c2); for (let c = min + 1; c < max; c++) if (board[r1][c] !== 0) return false; return true; }
            if (c1 === c2) { const min = Math.min(r1, r2); const max = Math.max(r1, r2); for (let r = min + 1; r < max; r++) if (board[r][c1] !== 0) return false; return true; }
            return false;
        };
        const getPath = (board, r1, c1, r2, c2) => {
            if (r1 === r2 && c1 === c2) return null; 
            if (board[r1][c1] !== board[r2][c2] || board[r1][c1] === 0) return null; 
            if ((r1 === r2 || c1 === c2) && isPathClear(board, r1, c1, r2, c2)) return [{r: r1, c: c1}, {r: r2, c: c2}]; 
            if (board[r1][c2] === 0 && isPathClear(board, r1, c1, r1, c2) && isPathClear(board, r1, c2, r2, c2)) return [{r: r1, c: c1}, {r: r1, c: c2}, {r: r2, c: c2}];
            if (board[r2][c1] === 0 && isPathClear(board, r1, c1, r2, c1) && isPathClear(board, r2, c1, r2, c2)) return [{r: r1, c: c1}, {r: r2, c: c1}, {r: r2, c: c2}];
            for (let dir = -1; dir <= 1; dir += 2) {
                let c = c1 + dir; while (c >= 0 && c < COLS + 2 && board[r1][c] === 0) {
                    if (board[r2][c] === 0 && isPathClear(board, r1, c, r2, c) && isPathClear(board, r2, c, r2, c2)) return [{r: r1, c: c1}, {r: r1, c}, {r: r2, c}, {r: r2, c: c2}]; c += dir;
                }
            }
            for (let dir = -1; dir <= 1; dir += 2) {
                let r = r1 + dir; while (r >= 0 && r < ROWS + 2 && board[r][c1] === 0) {
                    if (board[r][c2] === 0 && isPathClear(board, r, c1, r, c2) && isPathClear(board, r, c2, r2, c2)) return [{r: r1, c: c1}, {r, c: c1}, {r, c: c2}, {r: r2, c: c2}]; r += dir;
                }
            }
            return null; 
        };
        const findHint = (board) => {
            for (let i = 1; i <= ROWS; i++) for (let j = 1; j <= COLS; j++) if (board[i][j] !== 0)
                for (let k = 1; k <= ROWS; k++) for (let l = 1; l <= COLS; l++) if ((i !== k || j !== l) && board[i][j] === board[k][l]) {
                    const path = getPath(board, i, j, k, l); if (path) return {p1: {r: i, c: j}, p2: {r: k, c: l}, path};
                }
            return null;
        };

        // ===================== MAIN APP =====================
        const App = () => {
            const [isStandalone, setIsStandalone] = useState(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [showInstallPrompt, setShowInstallPrompt] = useState(false);
            
            const [playerName, setPlayerName] = useState(() => localStorage.getItem('pkmnPlayerName') || '');
            const [loginError, setLoginError] = useState('');
            const [gameState, setGameState] = useState('LOGIN'); 
            const [isLoadingProfile, setIsLoadingProfile] = useState(false);
            
            // Profile state yang support resume board
            const [profile, setProfile] = useState({ 
                tickets: 0, hints: 3, shuffles: 3, hp: 3, balanceIDR: 0, coins: 0, 
                flexCrown: false, unlockedThemes: ['sweets'], currentLevel: 1, currentScore: 0,
                savedBoard: null, savedProgress: 100 
            });
            
            const [activeTheme, setActiveTheme] = useState(() => localStorage.getItem('pkmnTheme') || 'sweets');
            const [board, setBoard] = useState([]);
            
            // State in-game
            const [level, setLevel] = useState(1);
            const [score, setScore] = useState(0);
            const [hp, setHp] = useState(3);
            const [hints, setHints] = useState(3);
            const [shuffles, setShuffles] = useState(3);
            
            const [progress, setProgress] = useState(100); 
            const [selectedTile, setSelectedTile] = useState(null);
            const [matchedTiles, setMatchedTiles] = useState([]); 
            const [hintActiveTiles, setHintActiveTiles] = useState([]); 
            const [activePath, setActivePath] = useState(null); 
            const [wrongTile, setWrongTile] = useState(null);

            const [showTimerAdd, setShowTimerAdd] = useState(false);
            const [showTimeoutFlash, setShowTimeoutFlash] = useState(false);
            const [showBoardClear, setShowBoardClear] = useState(false);
            const [isMuted, setIsMuted] = useState(() => localStorage.getItem('pkmnMuted') === 'true');
            const [isNewRecord, setIsNewRecord] = useState(false);
            const [levelStartTime, setLevelStartTime] = useState(0);
            const [countdown, setCountdown] = useState(null);
            const [alertData, setAlertData] = useState(null);

            const boardRef = useRef(board);
            const activeThemeRef = useRef(activeTheme);
            const gameStateRef = useRef(gameState);

            useEffect(() => {
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                };
                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                
                const mediaQuery = window.matchMedia('(display-mode: standalone)');
                const handleChange = (e) => setIsStandalone(e.matches);
                mediaQuery.addEventListener('change', handleChange);
                
                return () => {
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                    mediaQuery.removeEventListener('change', handleChange);
                };
            }, []);

            useEffect(() => { boardRef.current = board; activeThemeRef.current = activeTheme; gameStateRef.current = gameState; }, [board, activeTheme, gameState]);
            useEffect(() => { AudioEngine.setMuted(isMuted); localStorage.setItem('pkmnMuted', isMuted); }, [isMuted]);
            
            // eslint-disable-next-line react-hooks/exhaustive-deps
            useEffect(() => { if(playerName && gameState === 'LOGIN') handleLoginSubmit(); }, []);

            const showAlert = (title, content) => setAlertData({ title, content });

            const handleLoginSubmit = async () => {
                if (playerName.trim()) {
                    const name = playerName.trim();
                    localStorage.setItem('pkmnPlayerName', name); setLoginError(''); setIsLoadingProfile(true);
                    const p = await fetchProfile(name);
                    if(!p.unlockedThemes.includes(activeTheme)) setActiveTheme('sweets');
                    await saveProfile(name, p); setProfile(p);
                    setIsLoadingProfile(false); setGameState('LOBBY_MAIN');
                } else setLoginError('Nama tidak boleh kosong!');
            };

            const triggerLevelEndStats = useCallback(async (isGameOver = false) => {
                if (isGameOver) {
                    AudioEngine.gameOver();
                    const coinsEarned = Math.floor(score * 0.1);
                    // Reset semuanya, hapus juga savedBoard
                    const newProfile = { 
                        ...profile, 
                        coins: profile.coins + coinsEarned,
                        currentLevel: 1, 
                        currentScore: 0,
                        hp: 3, 
                        hints: 3, 
                        shuffles: 3,
                        savedBoard: null,
                        savedProgress: 100
                    };
                    setProfile(newProfile); await saveProfile(playerName, newProfile);
                    setGameState('GAMEOVER');
                } else {
                    AudioEngine.levelClear(); setShowBoardClear(true);
                    
                    const timeTaken = Date.now() - levelStartTime;
                    let gotTicket = false;
                    let newTickets = profile.tickets;
                    
                    if (timeTaken > 5000) {
                        newTickets += 1;
                        gotTicket = true;
                    }

                    const nextLevel = level + 1;
                    
                    // Simpan level, hapus savedBoard karena level selanjutnya pakai papan baru
                    const newProfile = {
                        ...profile,
                        tickets: newTickets,
                        currentLevel: nextLevel,
                        currentScore: score,
                        hp: hp,
                        hints: hints,
                        shuffles: shuffles,
                        savedBoard: null,
                        savedProgress: 100
                    };
                    setProfile(newProfile); await saveProfile(playerName, newProfile);

                    setTimeout(() => {
                        setShowBoardClear(false); setGameState('WON');
                        setTimeout(() => {
                            const newB = generateBoard(activeThemeRef.current);
                            // Set parameter progress default 100 saat level baru
                            prepareLevel(nextLevel, newB, activeThemeRef.current, score, hp, hints, shuffles, 100);
                        }, gotTicket ? 3000 : 1500); 
                        if(gotTicket) showAlert("Yeay!", "Hebat! Kamu dapat 1 Tiket Kado Misteri. Kumpulkan sebanyak-banyaknya!");
                        else showAlert("Awas!", "Terlalu cepat menyelesaikan level! Sistem mendeteksi aktivitas mencurigakan. Tiket dibatalkan.");
                    }, 500);
                }
            }, [level, score, playerName, profile, levelStartTime, hp, hints, shuffles]);

            const handleLevelCleared = useCallback(() => triggerLevelEndStats(false), [triggerLevelEndStats]);

            const guaranteedShuffle = (currentBoard) => {
                let tiles = []; let pos = [];
                for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) if (currentBoard[r][c] !== 0) { tiles.push(currentBoard[r][c]); pos.push({r, c}); }
                if (tiles.length === 0) return currentBoard; let newB = [...currentBoard.map(row => [...row])];
                for (let attempt = 0; attempt < 50; attempt++) {
                    tiles.sort(() => Math.random() - 0.5); for (let i = 0; i < pos.length; i++) newB[pos[i].r][pos[i].c] = tiles[i];
                    if (findHint(newB)) return newB;
                }
                for (let i = 0; i < tiles.length; i++) for (let j = i + 1; j < tiles.length; j++) if (tiles[i] === tiles[j]) {
                    newB[pos[0].r][pos[0].c] = tiles[i]; newB[pos[1].r][pos[1].c] = tiles[j];
                    if (findHint(newB)) return newB;
                }
                return newB; 
            };

            const handleDeadlock = useCallback((b) => setBoard(guaranteedShuffle(b)), []);

            const generateBoard = useCallback((themeKey = activeThemeRef.current) => {
                const newBoard = Array.from({ length: ROWS + 2 }, () => Array(COLS + 2).fill(0));
                const themeData = THEMES[themeKey].data; let selectedIds = []; const requiredPairs = (ROWS * COLS) / 4;
                while (selectedIds.length < requiredPairs) selectedIds.push(...[...themeData].sort(() => Math.random() - 0.5));
                selectedIds = selectedIds.slice(0, requiredPairs);
                let tiles = []; selectedIds.forEach(id => tiles.push(id, id, id, id)); tiles.sort(() => Math.random() - 0.5);
                let idx = 0; for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) newBoard[r][c] = tiles[idx++];
                let attempts = 0;
                while (!findHint(newBoard) && attempts < 10) {
                    tiles.sort(() => Math.random() - 0.5); idx = 0;
                    for (let r = 1; r <= ROWS; r++) for (let c = 1; c <= COLS; c++) newBoard[r][c] = tiles[idx++];
                    attempts++;
                }
                return newBoard;
            }, []);

            // Tambahan parameter startProgress untuk Resume Game
            const prepareLevel = async (startLevel, providedBoard = null, providedTheme = null, startScore = null, startHp = null, startHints = null, startShuffles = null, startProgress = 100) => {
                const currentT = providedTheme || activeThemeRef.current;
                const b = providedBoard || generateBoard(currentT);
                setBoard(b); setLevel(startLevel);
                
                setScore(startScore !== null ? startScore : profile.currentScore);
                setHp(startHp !== null ? startHp : profile.hp);
                setHints(startHints !== null ? startHints : profile.hints);
                setShuffles(startShuffles !== null ? startShuffles : profile.shuffles);
                
                if (startLevel === 1 && !providedBoard) setIsNewRecord(false); 
                setMatchedTiles([]);
                
                setGameState('LOADING_BOARD');
                
                // Jika board baru, mulai animasi loading dari 0 ke 100.
                if (startProgress === 100) {
                    setProgress(0); 
                    let p = 0; const interval = setInterval(() => { p += 25; setProgress(p); }, 100);
                    await new Promise(r => setTimeout(r, 400)); clearInterval(interval); setProgress(100);
                } else {
                    // Jika resume game, restore sisa waktunya
                    setProgress(startProgress);
                    await new Promise(r => setTimeout(r, 400));
                }
                
                setLevelStartTime(Date.now() + 3700);
                runCountdownThenPlay(Date.now() + 3700, startProgress);
            };

            const runCountdownThenPlay = (startAt, initialProgress = 100) => {
                setProgress(initialProgress); setGameState('COUNTDOWN');
                const steps = [{ label: 3, offset: -3000 }, { label: 2, offset: -2000 }, { label: 1, offset: -1000 }, { label: 'GO!', offset: 0 }];
                steps.forEach(({ label, offset }) => {
                    const delay = Math.max(0, (startAt + offset) - Date.now());
                    setTimeout(() => { setCountdown(label); AudioEngine.tick(label); }, delay);
                });
                const playDelay = Math.max(0, (startAt + 700) - Date.now());
                setTimeout(() => {
                    setCountdown(null); setSelectedTile(null); setMatchedTiles([]); setActivePath(null); setHintActiveTiles([]);
                    setGameState('PLAYING');
                }, playDelay);
            };

            const handleTileClick = (r, c) => {
                if (gameStateRef.current !== 'PLAYING') return;
                const currentBoard = boardRef.current;
                if (currentBoard[r][c] === 0 || matchedTiles.some(m => m.r === r && m.c === c)) return; 
                if (selectedTile && selectedTile.r === r && selectedTile.c === c) { setSelectedTile(null); return; }
                if (!selectedTile) { setSelectedTile({r, c}); return; }

                const virtualBoard = currentBoard.map(row => [...row]);
                matchedTiles.forEach(m => { virtualBoard[m.r][m.c] = 0; });
                if (virtualBoard[selectedTile.r][selectedTile.c] === 0 || virtualBoard[r][c] === 0) { setSelectedTile(null); return; }

                const path = getPath(virtualBoard, selectedTile.r, selectedTile.c, r, c);
                if (path) {
                    const r1 = selectedTile.r; const c1 = selectedTile.c; const id1 = virtualBoard[r1][c1]; const id2 = virtualBoard[r][c];
                    const newMatches = [{r: r1, c: c1, id: id1}, {r, c, id: id2}];
                    setMatchedTiles(prev => [...prev, ...newMatches]); setHintActiveTiles([]); setActivePath(path); AudioEngine.match();

                    setShowTimerAdd(true); setTimeout(() => setShowTimerAdd(false), 900); setSelectedTile(null); 

                    setTimeout(() => {
                        setBoard(prev => {
                            const newBoard = prev.map(row => [...row]);
                            if (newBoard[r1][c1] !== 0 && newBoard[r][c] !== 0) {
                                newBoard[r1][c1] = 0; newBoard[r][c] = 0;
                                if (countRemaining(newBoard) === 0) setTimeout(() => handleLevelCleared(), 0);
                                else if (!findHint(newBoard)) setTimeout(() => handleDeadlock(newBoard), 0);
                            }
                            return newBoard;
                        });
                        setMatchedTiles(prev => prev.filter(m => !( (m.r === r1 && m.c === c1) || (m.r === r && m.c === c) )));
                        setActivePath(null); 
                        setScore(s => {
                            const ns = s + 10; const best = parseInt(localStorage.getItem('pkmnBestScore') || '0');
                            if (ns > best) { localStorage.setItem('pkmnBestScore', ns); setIsNewRecord(true); }
                            return ns;
                        });
                        setProgress(p => Math.min(100, p + 4)); 
                    }, 350); 
                } else {
                    AudioEngine.wrong(); setWrongTile({r, c}); setTimeout(() => setWrongTile(null), 380); setSelectedTile({r, c});
                }
            };

            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                const speed = getTimerSpeed(level);
                const timer = setInterval(() => {
                    setProgress(prev => { if (prev <= 0) { clearInterval(timer); handleTimeout(); return 0; } return prev - speed; });
                }, 200);
                return () => clearInterval(timer);
            }, [gameState, level]);

            const handleTimeout = () => {
                AudioEngine.timeout(); setShowTimeoutFlash(true);
                setTimeout(() => {
                    setShowTimeoutFlash(false);
                    if (hp > 1) { 
                        setHp(h => h - 1); 
                        
                        const newProfile = { ...profile, hp: hp - 1 };
                        setProfile(newProfile); saveProfile(playerName, newProfile);
                        
                        const newB = generateBoard(activeThemeRef.current);

                    else {
                        triggerLevelEndStats(true);

                }, 1000);

            const handleShuffleClick = () => { if (shuffles > 0 && gameState === 'PLAYING') { setShuffles(s => s - 1); AudioEngine.shuffle(); handleDeadlock(board); setSelectedTile(null); } };
            const handleHintClick = () => {
                if (hints > 0 && gameState === 'PLAYING') {
                    const hintData = findHint(board);
                    if (hintData) { setHints(h => h - 1); AudioEngine.hint(); setHintActiveTiles([{r: hintData.p1.r, c: hintData.p1.c}, {r: hintData.p2.r, c: hintData.p2.c}]); setTimeout(() => setHintActiveTiles([]), 1200); }
                }
            };
            
            const handleBuyStore = async (item) => {
                if (profile.coins < item.price) { showAlert("Gagal", "Koin kamu tidak cukup!"); return; }
                const newProfile = { ...profile, coins: profile.coins - item.price };
                
                if (item.type === 'tema') newProfile.unlockedThemes = [...newProfile.unlockedThemes, item.id];
                else if (item.type === 'item') {
                    if (item.id === 'hp') newProfile.hp = Math.min(9, newProfile.hp + 1);
                    if (item.id === 'hints') newProfile.hints = Math.min(99, newProfile.hints + 3);
                    if (item.id === 'shuffles') newProfile.shuffles = Math.min(99, newProfile.shuffles + 3);
                }
                else if (item.type === 'item_bulk') {
                    if (item.id === 'hp') newProfile.hp = Math.min(9, newProfile.hp + item.val);
                    if (item.id === 'hints') newProfile.hints = Math.min(99, newProfile.hints + item.val);
                    if (item.id === 'shuffles') newProfile.shuffles = Math.min(99, newProfile.shuffles + item.val);
                }
                else if (item.type === 'flex') newProfile.flexCrown = true;
                
                setProfile(newProfile); await saveProfile(playerName, newProfile);
                showAlert("Berhasil", `Berhasil membeli ${item.name}!`);
            };

            const handleWithdrawSuccess = async () => {
                const newProfile = { ...profile, balanceIDR: 0 };
                setProfile(newProfile); 
                await saveProfile(playerName, newProfile);
            };

            return (
                <>
                <div className="w-full h-[100dvh] flex items-center justify-center p-0 sm:p-2 bg-gray-50/50">
                    <div className="w-full max-w-[480px] h-full flex flex-col bg-white sm:border sm:border-gray-200 sm:rounded-3xl sm:shadow-xl overflow-hidden relative">
                        
                        {/* ===================== IN-GAME HEADER ===================== */}
                        {(gameState === 'PLAYING' || gameState === 'PAUSED' || gameState === 'COUNTDOWN') && (
                            <div className="w-full bg-white px-4 py-3 flex flex-col gap-3 shrink-0 border-b border-gray-100 z-50 shadow-sm">
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-1.5 bg-rose-50 px-3 py-1.5 rounded-xl border border-rose-100">
                                        <IconHeart /><span className="text-sm font-bold text-rose-600">{hp}</span>
                                    </div>
                                    <div className="text-lg font-black text-gray-800 tracking-wide">Level {level}</div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setGameState('PAUSED')} className="icon-btn w-10 h-10"><IconPause /></button>
                                        <button onClick={() => setIsMuted(m => !m)} className={`icon-btn w-10 h-10 ${isMuted ? 'text-gray-400' : 'text-gray-700'}`}>
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5">{isMuted ? <path strokeLinecap="round" strokeLinejoin="round" d="M17.25 9.75L19.5 12m0 0l2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6l4.72-4.72a.75.75 0 011.28.531V19.94a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.506-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.395C2.806 8.757 3.63 8.25 4.51 8.25H6.75z" /> : <path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.395C2.806 8.757 3.63 8.25 4.51 8.25H6.75z" />}</svg>
                                        </button>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="flex-1 bg-gray-100 rounded-full h-2 relative overflow-hidden">
                                        <div className="h-full rounded-full transition-all duration-200" style={{ width: `${progress}%`, backgroundColor: progress > 40 ? '#34d399' : progress > 20 ? '#fbbf24' : '#f87171' }} />
                                    </div>
                                    <span className="text-[10px] font-bold text-gray-400 w-6 text-right">{getSecondsLeft(progress, level)}s</span>
                                    {showTimerAdd && <span className="absolute right-[40px] top-[45px] text-[10px] font-bold text-emerald-500 float-text z-[60]">+waktu</span>}
                                </div>
                                <div className="flex justify-between items-center">
                                    <div className="text-sm font-bold bg-white text-gray-700">Skor: <span className="text-pink-500">{score}</span></div>
                                    <div className="flex gap-2">
                                        <button onClick={handleHintClick} className="icon-btn px-3 py-1.5 gap-1.5"><IconSearch /><span className="text-xs font-bold">{hints}</span></button>
                                        <button onClick={handleShuffleClick} className="icon-btn px-3 py-1.5 gap-1.5"><IconRefresh /><span className="text-xs font-bold">{shuffles}</span></button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ===================== GRID ===================== */}
                        <div className="flex-1 w-full relative bg-gray-50/50">
                            {board.length > 0 && (
                                <>
                                    <svg viewBox={`0 0 ${COLS + 2} ${ROWS + 2}`} preserveAspectRatio="none" className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 10 }}>
                                        {activePath && (
                                            <g><path d={`M ${activePath.map(p => `${p.c + 0.5} ${p.r + 0.5}`).join(' L ')}`} fill="none" stroke="#f472b6" strokeWidth="0.15" strokeLinecap="round" strokeLinejoin="round" className="path-line-outer"/></g>
                                        )}
                                    </svg>

                                    <div className="absolute inset-0 grid p-1" style={{ zIndex: 20, gridTemplateColumns: `repeat(${COLS + 2}, 1fr)`, gridTemplateRows: `repeat(${ROWS + 2}, 1fr)`, gap: '2px' }}>
                                        {board.map((row, r) => row.map((cellId, c) => {
                                            if (r === 0 || r === ROWS + 1 || c === 0 || c === COLS + 1) return <div key={`${r}-${c}`} className="w-full h-full pointer-events-none" />;
                                            const isSelected = selectedTile && selectedTile.r === r && selectedTile.c === c;
                                            const matchingTile = matchedTiles.find(m => m.r === r && m.c === c);
                                            const isMatching = !!matchingTile;
                                            const isHinting = hintActiveTiles.find(h => h.r === r && h.c === c);
                                            const isWrong = wrongTile && wrongTile.r === r && wrongTile.c === c;
                                            const isEmpty = cellId === 0 && !isMatching;
                                            const cellData = isMatching ? matchingTile.id : cellId;

                                            return (
                                                <div key={`${r}-${c}`} className="relative w-full h-full" style={{ padding: '1px' }}>
                                                    {!isEmpty && (
                                                        <button className={`cute-tile ${isSelected ? 'selected' : ''} ${isMatching ? 'matched' : ''} ${isHinting ? 'hint-glow' : ''} ${isWrong ? 'wrong' : ''}`}
                                                            style={{ WebkitTapHighlightColor: 'transparent' }} onClick={() => handleTileClick(r, c)}>
                                                            <svg viewBox="0 0 100 100" className="w-full h-full pointer-events-none select-none">
                                                                <text x="50%" y="50%" dominantBaseline="central" textAnchor="middle" fontSize="64">{cellData}</text>
                                                            </svg>
                                                        </button>
                                                    )}
                                                </div>
                                            );
                                        }))}
                                    </div>
                                </>
                            )}
                        </div>

                        {showBoardClear && <div className="absolute inset-0 bg-white board-clear-flash z-[90] pointer-events-none" />}
                        {showTimeoutFlash && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center z-[95] timeout-flash pointer-events-none" style={{ background: 'rgba(239,68,68,0.9)' }}>
                                <span className="text-white text-3xl font-black drop-shadow-lg">Waktu Habis!</span>
                                <span className="text-white text-lg font-bold mt-2">-1 Nyawa</span>
                            </div>
                        )}

                        {/* ===================== SCREENS ===================== */}
                        
                        {gameState === 'LOGIN' && (
                            <div className="absolute inset-0 bg-white flex flex-col items-center justify-center z-[100] px-6">
                                <h1 className="text-4xl font-black text-gray-800 mb-2 tracking-tight">Sweet Connect</h1>
                                <p className="text-gray-500 font-medium mb-10 text-center text-sm">Siapa nama bidadari cantiknya aku?</p>
                                <input type="text" placeholder="Nama Panggilan" maxLength={15}
                                    className="bg-gray-50 border border-gray-200 rounded-2xl px-6 py-4 text-center text-lg font-bold text-gray-800 w-full focus:outline-none focus:border-pink-400 focus:bg-white transition-all mb-3"
                                    value={playerName} onChange={e => { setPlayerName(e.target.value); setLoginError(''); }}
                                    onKeyDown={e => e.key === 'Enter' && handleLoginSubmit()} disabled={isLoadingProfile}
                                />
                                {loginError && <p className="text-red-400 text-xs font-bold mb-4">{loginError}</p>}
                                <div className="mb-4"></div>
                                <button onClick={handleLoginSubmit} disabled={isLoadingProfile} className="btn-modern bg-gray-900 text-white w-full py-4 text-base rounded-2xl shadow-lg hover:bg-black">
                                    {isLoadingProfile ? 'Memuat Data...' : 'Masuk Sekarang'}
                                </button>
                            </div>
                        )}

                        {gameState === 'LOBBY_MAIN' && (
                            <div className="absolute inset-0 bg-white flex flex-col z-[100] custom-scroll overflow-y-auto">
                                <div className="w-full flex justify-between items-center p-6 pb-2">
                                    <div className="flex flex-col">
                                        <span className="text-xs font-bold text-gray-400">Halo sayangku,</span>
                                        <div className="flex items-center gap-1">
                                            <span className="text-xl font-black text-gray-800 tracking-tight">{playerName}</span>
                                            {profile.flexCrown && <IconCrown />}
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {!isStandalone && (
                                            <button onClick={() => setShowInstallPrompt(true)} className="btn-modern bg-pink-50 text-pink-600 px-4 py-2 rounded-xl font-bold border border-pink-100 shadow-sm text-sm relative">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                                                Install
                                            </button>
                                        )}
                                        <button onClick={() => setGameState('WALLET')} className="btn-modern bg-gray-50 px-4 py-2 rounded-xl text-gray-700 font-bold border border-gray-100 shadow-sm text-sm relative">
                                            <IconWallet /> Dompet
                                            {profile.balanceIDR > 0 && <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>}
                                        </button>
                                    </div>
                                </div>

                                <div className="flex-1 flex flex-col items-center justify-center p-6 w-full gap-4">
                                    <div className="relative w-full">
                                        {/* Logika Tombol Lanjutkan Game yang Baru */}
                                        <button onClick={() => {
                                            if (profile.savedBoard) {
                                                // Jika ada save game, panggil prepareLevel beserta data yang disimpan (board & progress/waktu)
                                                prepareLevel(
                                                    profile.currentLevel, 
                                                    profile.savedBoard, 
                                                    activeTheme, 
                                                    profile.currentScore, 
                                                    profile.hp, 
                                                    profile.hints, 
                                                    profile.shuffles, 
                                                    profile.savedProgress
                                                );
                                            } else {
                                                // Jika tidak ada, main level baru
                                                prepareLevel(profile.currentLevel);
                                            }
                                        }} className="btn-modern bg-pink-500 text-white w-full py-5 text-lg shadow-pink-500/30 shadow-xl rounded-2xl">
                                            <IconPlay /> {profile.savedBoard ? 'Lanjutkan Main' : profile.currentLevel > 1 ? `Lanjut ke Level ${profile.currentLevel}` : 'Main Sekarang'}
                                        </button>
                                        
                                        {!profile.savedBoard && (
                                            <span className="absolute -top-3 -right-2 bg-emerald-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md">
                                                Level {profile.currentLevel}
                                            </span>
                                        )}
                                        {profile.savedBoard && (
                                            <span className="absolute -top-3 -right-2 bg-amber-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md animate-pulse">
                                                Tersimpan
                                            </span>
                                        )}
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4 w-full">
                                        <button onClick={() => setGameState('ROULETTE')} className="btn-modern flex-col bg-white border border-gray-200 text-gray-800 py-4 rounded-2xl shadow-sm relative overflow-hidden">
                                            <div className="text-pink-500 mb-1"><IconGift /></div>
                                            <span className="text-sm">Kado Misteri</span>
                                            {profile.tickets > 0 && <span className="absolute top-2 right-2 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">{profile.tickets}</span>}
                                        </button>
                                        <button onClick={() => setGameState('SHOP')} className="btn-modern flex-col bg-white border border-gray-200 text-gray-800 py-4 rounded-2xl shadow-sm">
                                            <div className="text-amber-500 mb-1"><IconStore /></div>
                                            <span className="text-sm">Toko Tema</span>
                                        </button>
                                    </div>
                                </div>
                                <div className="p-6 text-center">
                                    <button onClick={() => { localStorage.removeItem('pkmnPlayerName'); setPlayerName(''); setGameState('LOGIN'); }} className="text-gray-400 font-bold text-xs">Ganti Akun</button>
                                </div>
                            </div>
                        )}

                        {gameState === 'SHOP' && <Shop profile={profile} activeTheme={activeTheme} onThemeSelect={(t) => { setActiveTheme(t); localStorage.setItem('pkmnTheme', t); }} onBuy={handleBuyStore} onClose={() => setGameState('LOBBY_MAIN')} />}
                        {gameState === 'WALLET' && <Wallet profile={profile} playerName={playerName} onWithdraw={handleWithdrawSuccess} onClose={() => setGameState('LOBBY_MAIN')} />}
                        {gameState === 'ROULETTE' && <MysteryGift profile={profile} onOpenComplete={(p) => { setProfile(p); saveProfile(playerName, p); }} onClose={() => setGameState('LOBBY_MAIN')} />}

                        {gameState === 'LOADING_BOARD' && (
                            <div className="absolute inset-0 bg-white flex flex-col items-center justify-center z-[100]">
                                <div className="w-12 h-12 border-4 border-gray-100 border-t-pink-500 rounded-full animate-spin mb-6"></div>
                                <h2 className="text-sm font-bold text-gray-500 mb-6 uppercase tracking-widest">Menyiapkan Meja</h2>
                                <div className="w-3/4 max-w-[200px] bg-gray-100 rounded-full h-1.5 overflow-hidden">
                                    <div className="h-full bg-pink-500 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        )}

                        {gameState === 'COUNTDOWN' && (
                            <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm flex flex-col items-center justify-center z-[100]">
                                <div key={countdown} style={{ animation: 'countdownPop 0.5s ease-out forwards', fontSize: countdown === 'GO!' ? '4rem' : '6rem', color: countdown === 'GO!' ? '#10b981' : 'white', fontWeight: 900, display: 'inline-block' }}>
                                    {countdown}
                                </div>
                            </div>
                        )}

                        {gameState === 'PAUSED' && (
                            <div className="absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center z-[100] px-6">
                                <h2 className="text-2xl font-black text-gray-800 mb-8 tracking-widest uppercase">Dijeda</h2>
                                <button onClick={() => setGameState('PLAYING')} className="btn-modern bg-gray-900 text-white w-full max-w-[260px] py-4 rounded-xl font-bold mb-4 shadow-md">Lanjutkan</button>
                                <button onClick={() => {
                                    // LOGIKA BARU: Menyimpan Board dan Progress Time!
                                    const newProfile = { 
                                        ...profile, 
                                        hp, hints, shuffles, 
                                        currentLevel: level, 
                                        currentScore: score,
                                        savedBoard: board,         // Simpan sisa tile di meja
                                        savedProgress: progress    // Simpan sisa waktu
                                    };
                                    setProfile(newProfile); 
                                    saveProfile(playerName, newProfile);
                                    setGameState('LOBBY_MAIN');
                                }} className="btn-modern bg-gray-100 text-gray-600 w-full max-w-[260px] py-4 rounded-xl font-bold border border-gray-200">Simpan & Keluar ke Menu</button>
                            </div>
                        )}

                        {gameState === 'GAMEOVER' && (
                            <div className="absolute inset-0 bg-white flex flex-col items-center justify-center z-[100] p-6">
                                <h2 className="text-2xl font-black text-gray-800 mb-8 uppercase tracking-widest">Game Over</h2>
                                <div className="w-full max-w-[300px] flex flex-col gap-3 mb-8">
                                    <div className="flex justify-between bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                                        <span className="text-gray-500 font-bold text-sm">Skor Akhir</span>
                                        <span className="text-pink-500 font-black text-lg">{formatNumber(score)}</span>
                                    </div>
                                    <div className="flex justify-between bg-white border border-gray-100 p-4 rounded-2xl shadow-sm">
                                        <span className="text-gray-500 font-bold text-sm">Berhenti di Level</span>
                                        <span className="text-gray-800 font-black text-lg">{level}</span>
                                    </div>
                                    <div className="flex justify-between bg-amber-50 border border-amber-100 p-4 rounded-2xl shadow-sm">
                                        <span className="text-amber-600 font-bold text-sm">Koin Didapat</span>
                                        <span className="text-amber-500 font-black text-lg flex items-center gap-1">+{Math.floor(score * 0.1)} <IconCoin/></span>
                                    </div>
                                </div>
                                {isNewRecord && <div className="bg-yellow-400 text-white font-black px-6 py-2 rounded-full mb-6 text-sm shadow-md uppercase tracking-wider">Rekor Baru!</div>}
                                <p className="text-xs text-red-500 font-bold mb-4">Level kamu kembali ke 1 karena nyawa habis.</p>
                                <button onClick={() => prepareLevel(1)} className="btn-modern bg-pink-500 text-white w-full max-w-[300px] py-4 rounded-xl font-bold shadow-md mb-4">Main Lagi (Level 1)</button>
                                <button onClick={() => setGameState('LOBBY_MAIN')} className="text-gray-400 font-bold text-sm">Kembali ke Menu</button>
                            </div>
                        )}

                        {gameState === 'WON' && (
                            <div className="absolute inset-0 bg-white flex flex-col items-center justify-center z-[100]">
                                <h2 className="text-2xl font-black text-gray-800 mb-6 tracking-widest">Naik Level!</h2>
                                <div className="w-10 h-10 border-4 border-gray-100 border-t-pink-500 rounded-full animate-spin"></div>
                            </div>
                        )}
                        
                        {/* OVERLAY INSTALL MUNCUL JIKA DITEKAN */}
                        {showInstallPrompt && !isStandalone && (
                            <InstallPrompt deferredPrompt={deferredPrompt} onClose={() => setShowInstallPrompt(false)} />
                        )}

                    </div>
                </div>
                
                <CustomModal isOpen={!!alertData} title={alertData?.title} content={alertData?.content} confirmText="OK" onConfirm={() => setAlertData(null)} />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
